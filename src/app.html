<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content, maximum-scale=5, user-scalable=yes"
		/>
		<meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f0f1a" media="(prefers-color-scheme: dark)" />
		<meta name="color-scheme" content="light dark" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="selftest.in" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="format-detection" content="telephone=no" />
		<meta name="google-adsense-account" content="ca-pub-7214001284506571" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/icons/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
		<style>
			#boot-screen {
				position: fixed;
				inset: 0;
				z-index: 2147483647;
				display: grid;
				place-content: center;
				gap: 12px;
				background: #f8fafc;
				color: #111827;
				font: 700 1.25rem/1.2 Inter, ui-sans-serif, system-ui, sans-serif;
				text-align: center;
				opacity: 1;
				transition: opacity 180ms ease, visibility 180ms ease;
			}

			#boot-screen.is-hidden {
				visibility: hidden;
				opacity: 0;
				pointer-events: none;
			}

			#boot-screen .boot-mark {
				display: block;
				width: 96px;
				height: 96px;
				line-height: 1;
				object-fit: contain;
			}

			#boot-screen .boot-spinner {
				width: 24px;
				height: 24px;
				margin: 4px auto 0;
				border: 3px solid rgba(79, 70, 229, 0.2);
				border-top-color: #4f46e5;
				border-radius: 50%;
				animation: boot-spin 700ms linear infinite;
			}

			@keyframes boot-spin {
			to { transform: rotate(360deg); }
			}

			@media (prefers-color-scheme: dark) {
				#boot-screen {
					background: #111827;
					color: #f8fafc;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				#boot-screen { transition: none; }
				#boot-screen .boot-spinner { animation: none; }
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="boot-screen" aria-hidden="true">
			<img class="boot-mark" src="/icons/192.png" alt="" width="96" height="96" />
			<span>selftest.in</span>
			<span class="boot-spinner"></span>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			window.setTimeout(() => document.getElementById('boot-screen')?.classList.add('is-hidden'), 10000);
		</script>
	</body>
</html>
